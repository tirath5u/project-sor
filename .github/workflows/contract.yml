name: Live API Contract

on:
  workflow_dispatch:
  schedule:
    - cron: "27 8 * * *"

jobs:
  live-contract:
    name: Live OpenAPI and Postman contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CONTRACT_BASE_URL: https://sor.myproduct.life
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run OpenAPI example contract against live API
        run: bun run contract:openapi

      - name: Run Postman collection with Newman against live API
        run: |
          bunx newman@6.2.1 run postman/project-sor.postman_collection.json \
            -e postman/project-sor.postman_environment.json \
            --env-var baseUrl="$CONTRACT_BASE_URL"
